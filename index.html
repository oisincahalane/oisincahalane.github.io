<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQE Revision Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F7F5F0; font-family: Georgia, serif; min-height: 100vh; }
    button { cursor: pointer; font-family: Georgia, serif; }
    button:hover { opacity: 0.85; }
    textarea { font-family: Georgia, serif; }
    .header { background: #1C1C1E; color: #F7F5F0; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #C9A84C; flex-wrap: wrap; gap: 12px; }
    .header-title-sub { font-size: 11px; letter-spacing: 3px; color: #C9A84C; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: bold; }
    .nav-btn { padding: 8px 18px; border-radius: 4px; font-size: 13px; letter-spacing: 1px; border: 1px solid #C9A84C; background: transparent; color: #C9A84C; }
    .nav-btn.active { background: #C9A84C; color: #1C1C1E; border-color: #C9A84C; font-weight: bold; }
    .container { max-width: 820px; margin: 0 auto; padding: 28px 20px; }
    .module-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; justify-content: center; }
    .mod-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; }
    .progress-bar-wrap { margin-bottom: 20px; }
    .progress-bar-labels { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 6px; }
    .progress-bar-track { height: 4px; background: #E0D9CF; border-radius: 2px; }
    .progress-bar-fill { height: 100%; border-radius: 2px; background: #C9A84C; transition: width 0.3s ease; }
    .card-module-badge { display: inline-flex; align-items: center; border-radius: 20px; padding: 4px 14px; margin-bottom: 14px; font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; border: 1.5px solid; }
    .flashcard { background: white; border-radius: 12px; padding: 36px; min-height: 200px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; position: relative; user-select: none; }
    .card-label { font-size: 10px; letter-spacing: 2px; color: #aaa; text-transform: uppercase; margin-bottom: 14px; }
    .card-text { font-size: 17px; line-height: 1.75; color: #1C1C1E; }
    .card-hint { position: absolute; bottom: 14px; right: 18px; font-size: 11px; color: #C9A84C; letter-spacing: 1px; }
    .answer-btns { display: flex; gap: 12px; margin-top: 18px; justify-content: center; flex-wrap: wrap; }
    .ans-btn { padding: 12px 24px; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; min-width: 120px; }
    .reveal-btn { padding: 10px 28px; background: #1C1C1E; color: white; border: none; border-radius: 6px; font-size: 13px; letter-spacing: 1px; margin: 14px auto 0; display: block; }
    .complete-card { background: white; border-radius: 12px; padding: 56px 40px; text-align: center; border: 2px solid #C9A84C; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .progress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
    .progress-card { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 2px solid; }
    .progress-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-mod-label { font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
    .progress-pct { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
    .score-bar-track { height: 6px; background: #F0EAE0; border-radius: 3px; margin-bottom: 10px; overflow: hidden; display: flex; gap: 1px; }
    .score-detail { display: flex; gap: 10px; font-size: 11px; }
    .not-studied { font-size: 13px; color: #bbb; font-style: italic; }
    .progress-actions { margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-dark { padding: 12px 28px; background: #1C1C1E; color: white; border: none; border-radius: 6px; font-size: 13px; letter-spacing: 1px; }
    .btn-danger { padding: 12px 28px; background: transparent; color: #C0392B; border: 1.5px solid #C0392B; border-radius: 6px; font-size: 13px; letter-spacing: 1px; }
    .add-container { max-width: 600px; margin: 0 auto; padding: 28px 20px; }
    .add-form { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin-bottom: 18px; }
    .field-label { display: block; font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
    .field-group { margin-bottom: 18px; }
    textarea.field-input { width: 100%; padding: 12px; border-radius: 6px; border: 1.5px solid #E0D9CF; font-size: 14px; line-height: 1.6; resize: vertical; outline: none; color: #1C1C1E; }
    textarea.field-input:focus { border-color: #C9A84C; }
    .alert { border-radius: 6px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; }
    .alert-error { background: #FDEAEA; border: 1px solid #C0392B; color: #C0392B; }
    .alert-success { background: #E8F8EE; border: 1px solid #27AE60; color: #27AE60; }
    .btn-add { width: 100%; padding: 14px; background: #1C1C1E; color: white; border: none; border-radius: 6px; font-size: 14px; letter-spacing: 1px; font-weight: bold; }
    .save-banner { background: #FFFBE8; border: 1.5px solid #B7950B; border-radius: 10px; padding: 18px 22px; }
    .btn-save { padding: 10px 22px; background: #B7950B; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: 12px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const BASE_CARDS = [
  { id: 0, module: "Ethics", q: "Who is the best bf everrrr? 🥰", a: "Oisín, obviously! 💛" },
  { id: 1, module: "DR", q: "When is a claim form with POC attached deemed served by post?", a: "The second business day after the relevant step of posting." },
  { id: 2, module: "DR", q: "If acknowledgement of service is filed within 14 days of deemed service of POC, how long does D have to file a defence?", a: "28 days FROM THE DEEMED DATE OF SERVICE of the POC (not from when AoS was filed)." },
  { id: 3, module: "DR", q: "What must parties do in response to a notice of proposed allocation from court?", a: "Complete and file the directions questionnaire and attempt to agree on proposed directions." },
  { id: 4, module: "DR", q: "What is a counterclaim and how should it be filed?", a: "Filed in the same proceedings as the main claim, combined with the defence into a single document — CPR 20.4." },
  { id: 5, module: "DR", q: "When MUST a court set aside a default judgment?", a: "When D had not been served with the CF or POC — CPR 13.2, regardless of prospects of success." },
  { id: 6, module: "DR", q: "What is a wasted costs order?", a: "Made only where a party's legal rep is held personally liable for costs by the court." },
  { id: 7, module: "DR", q: "Where there is no relevant pre-action protocol, what timeframe applies for correspondence?", a: "Within a reasonable time — 14 days in a straightforward case, no more than 3 months in a very complex one." },
  { id: 8, module: "DR", q: "What is the limitation period for contract claims?", a: "6 years from the date of breach of contract." },
  { id: 9, module: "DR", q: "When must the defendant respond to proceedings?", a: "Once PoC are served — then 14 days to file defence, or 28 days if acknowledgement of service is filed." },
  { id: 10, module: "DR", q: "What is the limitation period for personal injury claims?", a: "3 years from the date on which the cause of action accrued." },
  { id: 11, module: "DR", q: "For summary judgment, how much notice must the respondent be given?", a: "At least 14 days notice of the hearing and the issues." },
  { id: 12, module: "DR", q: "What are the bases for a defendant seeking security for costs from a claimant?", a: "Outside jurisdiction, insolvency/lack of funds, incorrect/missing address, evasion, nominal claimant/third party rep, asset manipulation." },
  { id: 13, module: "DR", q: "In multi-track CMC, when must the disclosure report be filed?", a: "Not less than 14 days before CMC. Parties must discuss and seek to agree proposals not less than 7 days before CMC." },
  { id: 14, module: "DR", q: "What are the conditions for the court to order an interim payment?", a: "D admits liability; a judgment for damages has been obtained; or court is satisfied C would win a substantial sum at trial." },
  { id: 15, module: "DR", q: "When goods are rejected for breach, what can the claimant claim?", a: "Return of money paid + difference between contract price and market replacement cost." },
  { id: 16, module: "DR", q: "When must an applicant serve an interim application notice?", a: "As soon as practicable but no later than three clear days before the hearing." },
  { id: 17, module: "DR", q: "To whom must an expert's report be addressed?", a: "To the court, not to the instructing party." },
  { id: 18, module: "DR", q: "Deemed service date for first class post documents?", a: "The second business day after posting. If electronically/fax before 4:30pm, deemed served the next day." },
  { id: 19, module: "WAE", q: "What are the criteria for an effective variation (refusing a gift and passing to someone else)?", a: "In writing, within 2 years of death, and included an express election for writing-back." },
  { id: 20, module: "WAE", q: "How is the cumulative total for IHT lifetime transfers calculated?", a: "Total chargeable value of lifetime transfers made in the 7 years before death — value of estate is irrelevant." },
  { id: 21, module: "WAE", q: "Under NCPR 22, who has the best right to apply for a grant of representation when someone dies intestate?", a: "The beneficiaries of the estate have the best right to apply." },
  { id: 22, module: "WAE", q: "Under NCPR 20, who can apply for a grant even if there is a will?", a: "Beneficiaries of the estate have the best right if executor cannot/will not act." },
  { id: 23, module: "WAE", q: "For CGT purposes when beneficiaries sell inherited assets, what value is used?", a: "The value of the asset at the moment of death." },
  { id: 24, module: "WAE", q: "How long must a CP/spouse survive the deceased to inherit the estate?", a: "28 days." },
  { id: 25, module: "WAE", q: "When does the presumption of knowledge and approval NOT apply to a will?", a: "When the will was signed by someone else on behalf of the testator and this was not expressly confirmed in the attestation clause." },
  { id: 26, module: "WAE", q: "On intestacy, when do children inherit on statutory trusts?", a: "Contingent on reaching the age of 18." },
  { id: 27, module: "WAE", q: "When does the 10% discount on property value NOT apply?", a: "Where the co-owner is the spouse. It applies if the co-owner is anyone else (e.g. sibling)." },
  { id: 28, module: "WAE", q: "What is the time limit for a claim under the Inheritance (Provision for Family and Dependants) Act 1975?", a: "Within the first six months from the date of grant of representation." },
  { id: 29, module: "WAE", q: "Can marriage and annual IHT exemptions be mixed?", a: "Yes — there is no rule preventing the mixing of marriage and annual exemptions." },
  { id: 30, module: "CLP", q: "For exclusion of evidence on unreliability of a confession, what must the prosecution show?", a: "Beyond reasonable doubt, that no such threat was made OR that the threat did not cause the confession." },
  { id: 31, module: "CLP", q: "What is the relevant time for detention purposes?", a: "Time of arrival at the police station as per the custody record. Maximum detention: +24h. First review: authorised detention +6h." },
  { id: 32, module: "CLP", q: "When is an appeal of a bail decision heard?", a: "No later than the business day after it is served." },
  { id: 33, module: "CLP", q: "What defence does D have for failing to surrender to custody?", a: "D must prove she had reasonable cause for failing to surrender." },
  { id: 34, module: "CLP", q: "What sections cover adverse inference?", a: "S34 — failure to mention facts; S36 — failure to account for object/substances/marks; S37 — failure to account for presence." },
  { id: 35, module: "CLP", q: "If D exercises right of silence and later raises self-defence, what risk does D run?", a: "An adverse inference being drawn at trial." },
  { id: 36, module: "CLP", q: "Can an equivocal confession be valid?", a: "Yes — a confession can be valid even if equivocal, as long as it is partially adverse to the confessor." },
  { id: 37, module: "CLP", q: "What happens in a Newton hearing?", a: "Court decides if prosecution proved their version beyond reasonable doubt. If P succeeds, D sentenced on P's version; if P fails, D's version applies." },
  { id: 38, module: "CLP", q: "What is the appropriate procedure for challenging a decision on a point of law?", a: "Appeal by way of case stated. Filing a notice of appeal is for conviction/sentence appeals." },
  { id: 39, module: "CLP", q: "What does the court consider when deciding whether a youth should be tried jointly with an adult?", a: "Whether separate trials would cause injustice to witnesses or the case as a whole." },
  { id: 40, module: "CLP", q: "What are the elements for guilty of occasioning ABH?", a: "D realised actions created a risk that P would fear immediate unlawful force AND injury was caused." },
  { id: 41, module: "CLP", q: "What is the consequence of breaching a bail condition vs failing to surrender?", a: "Failing to surrender (without reasonable cause) is a punishable offence. Breaching a bail condition itself is not an offence but can lead to arrest and remand." },
  { id: 42, module: "CLP", q: "Are admissions made outside court admissible?", a: "Yes — admissions to a crime made by D outside of court are admissible as an exception to the hearsay rule." },
  { id: 43, module: "CLP", q: "What happens if D breaches bail due to external factors?", a: "D is still in breach of bail and will be brought before the court for bail to be reconsidered." },
  { id: 44, module: "PP", q: "What does an environmental report typically include?", a: "Flooding risk based on historic and publicly available data — river flooding, surface water flooding, historic flood events, EA data." },
  { id: 45, module: "PP", q: "When does risk of damage to property pass to the buyer?", a: "Upon exchange of contracts. The buyer is responsible for insuring from that point." },
  { id: 46, module: "PP", q: "What must a landlord's reason for refusing consent to assignment relate to?", a: "The assignee's ability to meet the lease terms — not subjective business preferences." },
  { id: 47, module: "PP", q: "Does assignment of a registered lease require registration regardless of time left on lease?", a: "Yes — the deed of assignment must always be registered, regardless of how long is left on the lease." },
  { id: 48, module: "PP", q: "What is the liability position for pre-1996 leases on assignment?", a: "Original tenant remains liable for the whole term (privity of contract). Assignee is liable through privity of estate while it holds the lease. Post-1996 assignee is released on assignment." },
  { id: 49, module: "PP", q: "What does SCPC 6.6.4 require of the buyer?", a: "If the seller gave an indemnity covenant, the buyer must give an indemnity covenant to the seller in the transfer at completion." },
  { id: 50, module: "PP", q: "Where are mortgages and restrictions on the proprietor recorded on a register?", a: "Charges (mortgages) are in the charges register. Restrictions on the proprietor's ability to deal are in the proprietorship register." },
  { id: 51, module: "PP", q: "When does a D(ii) land charge bind a purchaser?", a: "When it is registered at the Central Land Charges department against the name of the original covenantor." },
  { id: 52, module: "PP", q: "Do internal building works require planning permission?", a: "No. A change of use within the same use class also does not constitute development. However, building regulations approval is required for safety matters." },
  { id: 53, module: "PP", q: "What does a SIM search inform about?", a: "Whether neighbouring land is registered. If registered, the easement needs to be on the charges register to bind current owners. If unregistered, it continues to bind." },
  { id: 54, module: "PP", q: "What is the right search for a public footpath/right of way abutting or crossing a property?", a: "Replies to standard enquiries of the local authority (CON29)." },
  { id: 55, module: "PP", q: "What is the difference between CON29 and LLC1 regarding planning permissions?", a: "CON29 shows all planning applications (granted, refused, pending). LLC1 only shows planning permissions that have been granted (with conditions)." },
  { id: 56, module: "PP", q: "When can input VAT be offset against output VAT?", a: "Only where the business is making taxable supplies." },
  { id: 57, module: "PP", q: "What does a restriction reading no disposition by a sole proprietor indicate, and what must the buyer do?", a: "Indicates tenants in common. Buyer must appoint another trustee to pay purchase money to, so the other TiC's interest is overreached." },
  { id: 58, module: "PP", q: "Can a solicitor act on a sale in negative equity? What condition applies?", a: "Yes, but no undertaking may be given unless the shortfall is held in cleared funds in client account with client's agreement." },
  { id: 59, module: "PP", q: "How should an option agreement be protected for registered vs unregistered land?", a: "Registered land: register as a notice. Unregistered land: C(iv) land charge (estate contracts). Note: D(ii) is for restrictive covenants." },
  { id: 60, module: "PP", q: "Is competition by the assignee with the landlord's business grounds for withholding consent to assignment?", a: "Yes — it is a ground for reasonably withholding consent." },
  { id: 61, module: "Land", q: "What are the four requirements for an easement?", a: "1/ Benefits dominant tenement, 2/ Burdens servient tenement/accommodates the dominant, 3/ Diversity of ownership, 4/ Lies in grant." },
  { id: 62, module: "Land", q: "What are the disqualifying factors for an easement?", a: "1/ Exclusive use, 2/ Requires additional expenditure by the servient owner, 3/ Permission required." },
  { id: 63, module: "Land", q: "What are the methods for implying an easement?", a: "By necessity, common intention, Wheeldon v Burrows (prior use), s62 LPA 1925 (conveyance effect), prescription (long use)." },
  { id: 64, module: "Land", q: "What does s62 LPA 1925 do?", a: "Transforms existing rights enjoyed with the land into easements on a conveyance, unless expressly excluded. A lease renewal can convert a licence into a legal easement." },
  { id: 65, module: "Land", q: "What is the difference between easement implied by common intention vs by necessity?", a: "Common intention: land sold for a specific purpose known to both parties, easement is necessary for that purpose. Necessity: land is inaccessible/landlocked." },
  { id: 66, module: "Land", q: "When does the defence of prescription apply?", a: "When an activity has been an actionable nuisance for 20 years or more and no action has been taken during that period. The period is not affected by how long the current claimant has lived there." },
  { id: 67, module: "Tort", q: "What are the four elements of the defence of volenti?", a: "1/ C has knowledge of the precise risk, 2/ C voluntarily accepts the risk, 3/ C agrees to take the risk (expressly or impliedly), 4/ C voluntarily assumes the legal risk." },
  { id: 68, module: "Tort", q: "Can a company delegate its non-delegable duty of care for employee safety to a contractor?", a: "No — such a duty cannot be delegated. Hiring a contractor to manage safety inspections does not discharge the duty." },
  { id: 69, module: "Tort", q: "What is the Caparo test for duty of care?", a: "1/ Reasonably foreseeable resulting harm, 2/ Proximity between tortfeasor and victim, 3/ Fair, just and reasonable to impose a duty." },
  { id: 70, module: "Tort", q: "When is occupiers liability breached in relation to a warning sign?", a: "If the warning sign was not easily visible and therefore no reasonable steps were taken to ensure visitor safety." },
  { id: 71, module: "Tort", q: "Distinguish general damages from special damages in tort.", a: "General damages: non-quantifiable losses (future financial losses, pain, loss of amenity). Special damages: quantifiable financial losses up to trial (medical bills, lost wages)." },
  { id: 72, module: "Tort", q: "What is the secondary victim test?", a: "1/ A medically recognised psychiatric condition, 2/ Close tie of love and affection with primary victim, 3/ Proximity in time and space to the event, 4/ Shock must be sudden." },
  { id: 73, module: "Tort", q: "When does a doctor have a legal duty to act?", a: "Arising from their special relationship with the patient. Failure to arrange for another doctor to take over in their absence can constitute breach — an exception to the general no duty to act rule." },
  { id: 74, module: "Contract", q: "What makes an acceptance valid in contract law?", a: "A valid acceptance must be unconditional — conditional acceptance is not a valid acceptance." },
  { id: 75, module: "Contract", q: "When is there a duty to disclose a change in circumstances pre-contract?", a: "When a statement of fact has been made and circumstances change before contract conclusion rendering it false — silence alone is not usually misrepresentation but this is an exception." },
  { id: 76, module: "Contract", q: "Is there a presumption of intention to create legal relations in commercial agreements?", a: "Yes — there is a presumption of intention to create legal relations in commercial agreements." },
  { id: 77, module: "Contract", q: "What makes a misrepresentation actionable?", a: "The representation was material and directly influenced the decision to purchase. The law does not require proof that the purchaser would definitely have refused to contract." },
  { id: 78, module: "Contract", q: "When are terms incorporated by notice?", a: "They must be reasonably brought to the attention of the party — small print that is not sufficiently prominent is not incorporated." },
  { id: 79, module: "Contract", q: "What is the rule in Foakes v Beer?", a: "Part payment of a debt is not consideration for a promise to waive the remainder. A promise to accept less is not binding and the creditor can still sue for the remainder." },
  { id: 80, module: "Contract", q: "When can a third party enforce a contract term under the Contracts (Rights of Third Parties) Act 1999?", a: "If the third party is clearly identified in the contract and the contract is intended to confer a benefit upon them under s1(1)(b), unless the contract indicates otherwise." },
  { id: 81, module: "Contract", q: "In face-to-face contracts where fraud as to identity occurs, is the contract void or voidable?", a: "Voidable for misrepresentation — not void. Good title can therefore pass to an innocent third party." },
  { id: 82, module: "Crim", q: "What is the R v G test for mens rea of recklessness?", a: "D must have seen the risk of causing physical harm AND the risk D saw must be unreasonable to take." },
  { id: 83, module: "Crim", q: "What are the defences to criminal damage? Are they available to aggravated criminal damage?", a: "Self-defence; D honestly believed owner would have consented. Four conditions apply. NOT available to aggravated criminal damage or aggravated arson." },
  { id: 84, module: "Crim", q: "What are the AR and MR of aggravated criminal damage?", a: "AR: destroying or damaging property belonging to another or themselves. MR: intending to destroy/damage OR being reckless as to this, OR intending/being reckless as to endangering life." },
  { id: 85, module: "Crim", q: "Who bears the burden of proving diminished responsibility, and to what standard?", a: "The defendant bears the burden, on the balance of probabilities." },
  { id: 86, module: "Crim", q: "What is unlawful act manslaughter?", a: "An unlawful act (must be a crime), that is objectively dangerous (reasonable person test), and that caused death. Only MR for the unlawful act is required — no need to intend or foresee death." },
  { id: 87, module: "Crim", q: "What are the elements of robbery?", a: "Theft + force or the fear of force, used immediately before or at the time of stealing. Threat can be directed at any person including third parties." },
  { id: 88, module: "Trusts", q: "Distinguish self-dealing from fair-dealing by a trustee.", a: "Self-dealing: T benefits themselves at expense of beneficiaries — voidable by Bs. Fair-dealing: T acts in accordance with Bs best interests, with transparency and fairness." },
  { id: 89, module: "Trusts", q: "What is the beneficiary principle?", a: "Must be definite, ascertainable beneficiaries who can enforce the trust. No man is a trustee for himself. Exceptions: charitable and non-charitable purpose trusts." },
  { id: 90, module: "Trusts", q: "What are the Endacott exceptions for non-charitable purpose trusts?", a: "Maintenance of a particular animal, maintenance of monuments and graves, saying of private masses. Must be drafted with an express perpetuity clause." },
  { id: 91, module: "Trusts", q: "What are the perpetuity rules for trusts?", a: "Trusts with people or charities: statutory 125 years, can wait and see. Non-charitable purpose trusts: common law 21 years, can be extended by reference to a life in being." },
  { id: 92, module: "Trusts", q: "What is a bailor/bailee relationship?", a: "When the bailee has possession of the bailor's goods (but not title) and temporarily possesses another's property for a specific purpose." },
  { id: 93, module: "Trusts", q: "In the absence of a will stating when a class closes, what rules apply?", a: "Class closing rules apply — the class closes when the testator dies if a member has already satisfied the condition." },
  { id: 94, module: "Trusts", q: "What rights do objects of a discretionary trust have?", a: "Only a hope or expectation of receiving a benefit — no proprietary rights until the trustees exercise discretion in their favour." },
  { id: 95, module: "Trusts", q: "How must a declaration of trust respecting land be made?", a: "It must be evidenced in writing — enforceable from the time of writing. Oral declarations are insufficient." },
  { id: 96, module: "Trusts", q: "What presumption applies when property is purchased in joint names without an express trust?", a: "Beneficial ownership mirrors legal ownership. This can only be rebutted with strong evidence of a different common intention — not easily inferred from financial contributions alone." },
  { id: 97, module: "Trusts", q: "For fixed trusts, does difficulty in locating beneficiaries invalidate the trust?", a: "No — a complete list of who belongs to the class keeps the gift valid. Difficulty locating Bs is administratively complicated only, not a reason to invalidate." },
  { id: 98, module: "Ethics", q: "What should you do in case of suspicious activity, and why not request more information from the client first?", a: "Report to MLRO straight away — requesting more info may alert the client and allow illicit activities to go unnoticed, failing to mitigate the immediate risk." },
  { id: 99, module: "Ethics", q: "What are the reserved legal activities under the Legal Services Act?", a: "Exercise of right of audience, conduct of litigation, reserved instrument activities (most conveyancing), probate activities, notarial activities, administration of oaths. General legal advice is NOT reserved." },
  { id: 100, module: "Ethics", q: "When can a firm rely on another person's CDD under MLR?", a: "If they obtain a written agreement ensuring immediate access to necessary information and verification data. The firm must also continue to monitor the business relationship." },
  { id: 101, module: "BLP", q: "When does a director's service contract require shareholder approval?", a: "Only if the guaranteed term is over 2 years. If it is exactly 2 years, no shareholder approval is needed." },
  { id: 102, module: "BLP", q: "How is a PSC (person with significant control) defined?", a: "By share ownership AND control of voting rights — if either is over 25%, they qualify." },
  { id: 103, module: "BLP", q: "For a derivative claim, what must a shareholder show?", a: "A prima facie case that directors have breached their statutory duties to the company." },
  { id: 104, module: "BLP", q: "To call a general meeting on short notice, what consent is required?", a: "Consent of shareholders representing 90% of the total voting rights AND a majority in number of shareholders." },
  { id: 105, module: "BLP", q: "Under MA 14, what restrictions apply to a director with an interest in a transaction?", a: "The director may not vote or count in the quorum in relation to that transaction." },
  { id: 106, module: "BLP", q: "What resolutions are needed to issue preference shares?", a: "OR to grant directors authority to allot; SR to amend articles to include new class. If shares don't carry right to participate, pre-emption rights need not be disapplied." },
  { id: 107, module: "BLP", q: "What happens if an LLP carries on business for over 6 months with only one member?", a: "That member becomes jointly and severally liable (with the LLP) for debts incurred after the 6-month grace period — limited liability is lost." },
  { id: 108, module: "BLP", q: "When does a partnership arise under s1 Partnership Act 1890?", a: "When two or more persons enter into a business with a view to making a profit." },
  { id: 109, module: "BLP", q: "Is a private limited company preferred over an LLP where limited liability and privacy are sought?", a: "Yes — a private limited company is preferred where limited liability, flexibility in raising finance, and no disclosure requirements are sought." },
  { id: 110, module: "BLP", q: "Distinguish a derivative claim from an unfair prejudice claim.", a: "Derivative: SH sues on company's behalf, relief goes to company. Unfair prejudice: SH sues against company for prejudicial conduct, most likely remedy is purchase of petitioner's shares." },
  { id: 111, module: "BLP", q: "Under s17(1) PA 1890, is a new partner liable for pre-existing partnership obligations?", a: "No — a new partner is not automatically liable for obligations incurred before they joined, unless there is an agreement to that effect." },
  { id: 112, module: "Public", q: "Can a decision made before the UK withdrew from the EU be relied upon?", a: "Yes — it can be relied upon as a kind of delegated act retained as assimilated law." },
  { id: 113, module: "Public", q: "What are the circumstances in which the Court of Appeal can depart from its own precedent?", a: "If a previous decision cannot stand with a decision of the Supreme Court, or if a previous decision was made per incuriam (without consideration of crucial legislation)." },
  { id: 114, module: "Public", q: "What does the EA 2010 require of employers regarding reasonable adjustments?", a: "The duty is anticipatory — employers must make reasonable adjustments to remove substantial disadvantages without waiting for specific requests from disabled persons." },
  { id: 115, module: "Public", q: "When does victimisation occur under the EA 2010?", a: "When an individual is subjected to a detriment because they have done or may do a protected act (e.g. making a complaint about discrimination). It is not determined by the person's perception alone." },
  { id: 116, module: "Public", q: "What does the doctrine of collective ministerial responsibility require?", a: "All Cabinet members must publicly support collective decisions or resign. If a minister cannot publicly support a policy, the correct course is resignation." },
  { id: 117, module: "Public", q: "Under Article 5(3) ECHR, what is required?", a: "Individuals must be brought promptly before a judge for judicial oversight. Periods exceeding a few days are incompatible unless justified by strong reasons (e.g. public emergencies)." },
  { id: 118, module: "Public", q: "What is the rule against bias in judicial review?", a: "Whether a fair-minded and informed observer would conclude there was a real possibility of bias." },
  { id: 119, module: "Public", q: "Under s14 Public Order Act 1986, what power does a senior police officer have?", a: "To impose conditions on a public assembly if they reasonably believe it is necessary to prevent intimidation (or other specified issues)." },
  { id: 120, module: "Public", q: "What does the EA 2010 require in terms of the duty to make adjustments?", a: "The duty is to remove substantial disadvantages for disabled persons. It is anticipatory and does not require a specific request." },
  { id: 121, module: "Trusts", q: "What formalities are required for a self-declaration of trust of land?", a: "The settlor must have legal title + formalities under s53 LPA 1925: must be in writing and signed. A deed is needed to appoint another person as trustee." },
  { id: 122, module: "Ethics", q: "Once a bill is submitted to a client, can the full amount be transferred from client account?", a: "Yes — once a bill is submitted, the firm can transfer the whole amount from client account to business account." },
  { id: 123, module: "Land", q: "Are restrictive covenants legal or equitable interests?", a: "Equitable interests — not legal." },
  { id: 124, module: "Land", q: "When can a lease be created orally under s54 LPA 1925?", a: "If it is for 3 years or less, takes effect in possession (immediate possession), and is at the best rent reasonably obtainable (market rent)." },
  { id: 125, module: "CLP", q: "What is the res gestae exception to the hearsay rule?", a: "A person is so emotionally overpowered by an event that the possibility of concoction or distortion can be disregarded." },
  { id: 126, module: "PP", q: "On death of a joint tenant in registered land, who executes the transfer?", a: "The survivor automatically acquires legal title. Only the new legal owner and buyer need to execute the transfer — executors of the deceased do not need to be involved. (If tenancy in common, executors would be involved.)" },
  { id: 127, module: "Trusts", q: "Can trustees invest in land under the general power of investment?", a: "No — land is a high-risk, non-standard investment. The general power of investment only permits loans secured on land. Trustees cannot delegate investment decisions to beneficiaries." },
  { id: 128, module: "CLP", q: "What are the AR and MR of common assault?", a: "AR: causing the victim to apprehend immediate application of unlawful force. MR: intending to cause such apprehension OR foreseeing the victim might have this apprehension." },
  { id: 129, module: "Trusts", q: "What must be shown to establish a common intention constructive trust?", a: "Common intention that the claimant should have a beneficial interest (to rebut the presumption that equity follows the law) + detrimental reliance on that common intention." },
  { id: 130, module: "CLP", q: "When is a person criminally liable as an accessory?", a: "They intended to assist, knew/foresaw the principal may commit the offence. They need not know the exact details, but the principal's act must be within the range of acts the accessory intended/foresaw." },
  { id: 131, module: "PP", q: "If concerned about restrictions, preservation orders or planning obligations when buying property, what steps should be taken?", a: "Local authority search, title check for restrictive covenants, and a site inspection/planning history review." },
  { id: 132, module: "Ethics", q: "Must every error be reported to the SRA?", a: "No — any professional negligence/breach of instructions must be communicated to the client, but the SRA does not require every error to be reported." },
  { id: 133, module: "Land", q: "When a joint tenancy is severed, what shares do the parties hold?", a: "Equal shares — severance converts the joint tenancy into a tenancy in common with equal shares, regardless of contributions to the initial purchase price." },
  { id: 134, module: "WAE", q: "What happens if a specific legacy is given to someone who dies before the testator?", a: "The gift fails (lapses). There is no automatic substitution unless the will expressly provides for it. The anti-lapse rule only applies to gifts to the testator's issue — the beneficiary's issue will substitute." },
  { id: 135, module: "PP", q: "What is the difference between assignment and sublease in terms of the immediate tenant?", a: "On assignment, the assignee becomes the immediate tenant. On a sublease, the original tenant remains the immediate tenant — a sublease does not change who the immediate tenant is." },
  { id: 136, module: "Crim", q: "What are the AR and MR of theft?", a: "AR: appropriation of property belonging to another. MR: dishonesty and intention to permanently deprive. Dishonesty can be negated if D genuinely believes they have a legal right, or that the owner cannot be found by reasonable steps." },
  { id: 137, module: "Trusts", q: "If trust money used in breach is used to buy property, how can beneficiaries reclaim it?", a: "If property increased in value: claim a proportionate share (e.g. 10% of purchase price). If lost in value: claim a lien for the fixed amount. If used to clear a bank overdraft: cannot be traced and cannot be reclaimed." },
  { id: 138, module: "PP", q: "If the seller dies after exchange of contracts, is the sale still binding?", a: "Yes — the executor of the estate is bound to complete the sale." },
  { id: 139, module: "Trusts", q: "Can trustees exclude liability for breach of statutory duty?", a: "Yes, if they acted honestly — liability for breach of statutory duty may be excluded. However, it cannot be excluded where the breach involves fraud or dishonesty." },
  { id: 140, module: "Crim", q: "What are the elements of the partial defence of loss of control?", a: "1/ Conduct resulted from loss of self-control (need not be sudden), 2/ qualifying trigger (fear of serious violence and/or things said or done), 3/ a normal person might have acted in the same or similar way." },
  { id: 141, module: "PP", q: "What is a report on title?", a: "A document containing the solicitor's advice on the legal provisions, which are themselves contained in the transfer/title document." },
  { id: 142, module: "Land", q: "When does long use of a road create a prescriptive easement?", a: "Only if use is as of right — without force, secrecy, or permission. If both parties agreed to the use, permission was given and no prescriptive easement can arise." },
  { id: 143, module: "CLP", q: "When does Turnbull guidance apply?", a: "The witness must have identified the suspect in an identification procedure. If no such procedure took place, the case does not rely on identification evidence and Turnbull does not apply." },
  { id: 144, module: "Trusts", q: "If A leaves an asset to B in their will, B dies before A and the asset increases in value — what happens?", a: "The gift does not lapse. When A dies, the asset passes to B's estate in full (including the increased value)." },
  { id: 145, module: "Public", q: "What is the mischief rule in statutory interpretation?", a: "The judge considers the defect in common law which caused Parliament to pass the statute, and interprets the statute to remedy that defect." },
  { id: 146, module: "Ethics", q: "What must the nominated officer do with evidence of money laundering?", a: "Report it to the National Crime Agency (NCA)." },
  { id: 147, module: "BLP", q: "What is deductible when calculating income tax?", a: "Interest on a loan is deductible, as is the personal allowance." },
  { id: 148, module: "Contract", q: "Which statute applies to: (1) consumer sales, (2) B2B sales, (3) hire-purchase, (4) goods supplied with services?", a: "(1) Consumer Rights Act 2015, (2) Sale of Goods Act 1979, (3) Supply of Goods (Implied Terms) Act 1973, (4) Supply of Goods and Services Act 1982." },
  { id: 149, module: "DR", q: "What is the appeal route from a District Judge in the County Court?", a: "District Judge to Circuit Judge to High Court Judge to Court of Appeal Judge." },
  { id: 150, module: "Tort", q: "When is an occupier not liable for damage caused by an independent contractor?", a: "If they: 1/ entrusted the work to an independent contractor, 2/ took reasonable steps to ensure the contractor was competent, 3/ checked the work where it was reasonable to do so." },
  { id: 151, module: "Public", q: "Distinguish harassment from victimisation under the EA 2010.", a: "Harassment: unwanted conduct related to a protected characteristic that creates a hostile/offensive environment. Victimisation: detriment suffered because the claimant did a protected act (e.g. made a complaint)." },
  { id: 152, module: "Contract", q: "Under privity of contract, who can enforce a contract?", a: "Only the parties to the contract — even if it was intended to benefit a third party. (Exception: Contracts (Rights of Third Parties) Act 1999.)" },
  { id: 153, module: "Tort", q: "Who can claim bereavement damages under the Fatal Accidents Act 1976, and who can bring dependency claims?", a: "Bereavement damages: spouse/civil partner only (or parents if the deceased was a minor). Dependency claims: spouse/CP, children, and possibly parents if financially dependent." },
  { id: 154, module: "BLP", q: "How are capital losses and the annual CGT exemption treated differently?", a: "Capital losses can be carried forward indefinitely. The annual CGT exemption can only be used in the tax year it arises — it cannot be carried forward." },
  { id: 155, module: "DR", q: "What is the difference between standard costs and indemnity costs?", a: "Standard: doubt on reasonable costs resolved in favour of the paying party. Indemnity: doubt resolved in favour of the receiving party (e.g. if a Part 36 offer is beaten at trial, or a party behaves unreasonably)." },
  { id: 156, module: "Contract", q: "Can liability for title be excluded in a sale of goods contract?", a: "No — implied terms for description, quality, fitness for purpose and misrepresentation can sometimes be limited if reasonable, but liability for title can never be excluded." },
  { id: 157, module: "Public", q: "When is the date shown in square brackets on a statute?", a: "The date in square brackets is the date the statute received Royal Assent." },
  { id: 158, module: "Ethics", q: "What is the difference between output VAT and input VAT, and what happens if input exceeds output?", a: "Output VAT: VAT the firm charges clients on services. Input VAT: VAT the firm pays on its own purchases. If input VAT paid exceeds output VAT collected, the firm can reclaim the difference from HMRC." },
  { id: 159, module: "Ethics", q: "What is the POCA 2002 consent timeline for a Suspicious Activity Report?", a: "SAR submitted to NCA. NCA has 7 days to respond. If consent refused, a 31-day moratorium period begins. If no court order extends it, the transaction may proceed after 31 days." },
  { id: 160, module: "DR", q: "By how much can parties extend the time for filing a defence without court permission?", a: "Up to 28 days in total, by agreement between parties." },
  { id: 161, module: "BLP", q: "How are dividends declared, and can shareholders force directors to pay one?", a: "Directors recommend; shareholders approve by ordinary resolution. Shareholders cannot declare a dividend unless directors have first recommended one. Dividends can be paid from accumulated distributable profits, not just the most recent year." },
  { id: 162, module: "BLP", q: "What is the difference between statutory pre-emption rights on new share issues vs transfers of existing shares?", a: "On new share allotments, s561 CA 2006 gives existing shareholders automatic pre-emption rights. There is no automatic statutory right when existing shares are sold — typically covered by shareholders' agreements or bespoke articles." },
  { id: 163, module: "Contract", q: "What are the conditions for a contract to be void for common mistake? How does this differ from frustration?", a: "Common mistake: both parties share the same mistaken assumption about a fundamental fact, and the subject matter did not exist at the time of contracting. Frustration: the subject matter existed at contracting but performance became impossible afterwards." },
  { id: 164, module: "Public", q: "What is the time limit for bringing a judicial review claim?", a: "Promptly, and in any event within 3 months of the decision being challenged." },
  { id: 165, module: "Contract", q: "Who can be strictly liable for a defective product?", a: "The retailer, the manufacturer, and the importer can all be held strictly liable." },
  { id: 166, module: "Ethics", q: "When may a solicitor engage in direct marketing?", a: "Current and former clients may be contacted. Others may only be contacted with their freely given, informed and specific consent. Direct marketing must not cause distress or amount to cold-calling." },
  { id: 167, module: "BLP", q: "Can a director resign at any time?", a: "Yes — a director may resign at any time by giving written notice to the company. Model articles do not require any notice period." },
  { id: 168, module: "DR", q: "What are the rules for serving the claim form and particulars of claim?", a: "The CF must be served within 4 months of issue. The PoC must be served with the CF or within 14 days of service of the CF, but no later than 4 months after issue of the CF." },
  { id: 169, module: "Contract", q: "What are the financial consequences of frustration?", a: "Contract is automatically discharged from the date of the frustrating event. Money already paid can be recovered (minus expenses incurred). Money due before frustration is still payable only to the extent of expenses incurred by the other party in performing." },
  { id: 170, module: "Public", q: "Can Parliament pass entrenched legislation that binds future Parliaments?", a: "No — Parliament cannot bind a future Parliament. No law is immune from repeal under the doctrine of parliamentary sovereignty." },
  { id: 171, module: "DR", q: "In a CFA case where C succeeds at trial, who pays the success fee and ATE insurance premium?", a: "C's solicitor's fees and disbursements are recoverable from D. The success fee and ATE insurance premium are recoverable from C (not D)." },
  { id: 172, module: "Public", q: "What does parliamentary privilege cover?", a: "All proceedings in Parliament — MPs and peers cannot be sued or prosecuted for anything said during parliamentary proceedings." },
  { id: 173, module: "DR", q: "When does the limitation clock start for a personal injury claim where C was under 18 at the time of injury?", a: "It does not start running until C's 18th birthday. The 3-year limitation period then runs from that date (or date of knowledge if later)." },
  { id: 174, module: "Public", q: "What notice must be given for a public procession?", a: "Written notice to the police at least 6 days before. The notice must include the date/time, proposed route, and the name/address of the organiser." },
  { id: 175, module: "Tort", q: "What is the difference between an employer's non-delegable duty and vicarious liability?", a: "Non-delegable duty: employer owes employees a personal duty to provide a safe system of work (cannot be delegated). Vicarious liability: employer is liable for torts committed by employees in the course of employment." },
  { id: 176, module: "Public", q: "What is the nature of the EA 2010 duty to make reasonable adjustments, and can cost be taken into account?", a: "The duty is anticipatory and ongoing. Balancing it against financial constraints is permissible — it is about making reasonable adjustments, not all necessary adjustments (e.g. a portable ramp instead of full renovation)." },
  { id: 177, module: "Public", q: "Under Article 34 ECHR and s7(7) HRA, who qualifies as a victim?", a: "An individual must be directly affected by the state action. Anticipatory harm does not qualify. Groups and organisations can only claim victim status if their own interests are directly affected." },
  { id: 178, module: "Public", q: "When does Article 15 ECHR permit derogations from Convention rights?", a: "Only in times of war or public emergencies threatening the life of the nation, and only where the government response is proportionate. An economic downturn is unlikely to meet that threshold." },
  { id: 179, module: "Public", q: "What does s19(1) HRA 1998 require of a minister introducing a bill?", a: "Before the second reading, the responsible minister must make a written statement asserting either that the bill is compatible with the ECHR, or that they cannot make such a statement but the government still wishes Parliament to proceed." },
  { id: 180, module: "Public", q: "What approach do courts take to standing for organisations bringing judicial review?", a: "Courts take a liberal approach, particularly for organisations that can demonstrate expertise and genuine concern in the relevant area." },
  { id: 181, module: "Public", q: "Under s7(1) HRA 1998, what must an applicant show to have standing?", a: "They must show they have been directly affected by a potential violation of a Convention right. A genuine and proven interest alone is not sufficient — direct effect is required." },
  { id: 182, module: "DR", q: "What is an attachment of earnings order and when is it most suitable?", a: "Where D has a steady income, an attachment of earnings order is the most suitable enforcement method — the court intercepts a portion of D's earnings directly from their employer to satisfy the judgment debt." },
  { id: 183, module: "Public", q: "How do courts approach the illegality defence in contract?", a: "The court considers public policy implications of allowing recovery and assesses whether it would damage the integrity of the legal system. This is a more nuanced and discretionary approach — an illegal contract is not automatically void and unenforceable." },
  { id: 184, module: "Contract", q: "Why is a gratuitous promise not an enforceable contract?", a: "Because the consideration is past — a promise made without fresh consideration at the time of the agreement cannot found a binding contract." },
  { id: 185, module: "BLP", q: "What is a Qualifying Floating Charge (QFC)?", a: "A floating charge that covers the whole or substantially the whole of the company's assets, and grants the holder the power to appoint an administrator." },
  { id: 186, module: "Contract", q: "When does acceptance by instantaneous communication take effect, and what if it is not received?", a: "Acceptance takes effect the moment it is received by the offeror. If not received through no fault of the offeror, no contract is concluded. However, if the failure to receive is the offeror's fault and the acceptor reasonably believed their acceptance was communicated, the offeror may be prevented from denying receipt." },
  { id: 187, module: "DR", q: "Are future losses general or special damages?", a: "General damages — future losses are estimated by the court and are not yet quantifiable, so they fall within general damages." },
  { id: 188, module: "Tort", q: "Does watching a traumatic event on TV satisfy the proximity requirement for a secondary victim claim?", a: "No — watching on TV does not fulfil the requirement of being present at the scene or its immediate aftermath with direct perception. It lacks the directness and immediacy of physical presence." },
  { id: 189, module: "BLP", q: "What costs are deductible for CGT purposes?", a: "Costs that enhance the value of the capital asset are deductible, such as restoration costs that increased the asset's market value." },
  { id: 190, module: "Contract", q: "What is the test for whether a clause is an unenforceable penalty?", a: "Whether the sum stipulated is exorbitant or unconscionable compared to the legitimate interest being protected. Where the interest is timely completion, a higher sum than actual loss may be justified provided it is not disproportionate." },
  { id: 191, module: "Ethics", q: "Does a solicitor's duty to their client override their duty to the court regarding relevant adverse authorities?", a: "No — solicitors must disclose relevant cases and statutory provisions to the court even if they negatively impact their client's argument. Duty to the court takes precedence over acting in the client's best interests." },
  { id: 192, module: "Public", q: "What is the effect of a declaration of incompatibility under s4 HRA?", a: "It is a formal recognition that legislation is incompatible with Convention rights, but it does not invalidate the provision or compel immediate government action. The law remains in effect until Parliament amends or repeals it, and the claimant receives no direct remedy." },
  { id: 193, module: "Contract", q: "What is required to establish frustration beyond an increase in expense or difficulty?", a: "An unforeseen event that renders the contract radically different from what the parties contemplated when it was made. An increase in expenses or onerousness alone is not sufficient." },
  { id: 194, module: "DR", q: "When must an application notice, evidence and draft order be served on the other party?", a: "As soon as practicable after the application has been issued, and at least 3 clear days before the hearing." },
  { id: 195, module: "Tort", q: "What are the requirements for a secondary victim psychiatric harm claim?", a: "1/ Psychiatric harm (not physical) was foreseeable, 2/ Close proximity of relationship with the primary victim, 3/ Proximity to the accident in time and space, 4/ Harm caused by fear for another's safety." },
  { id: 196, module: "DR", q: "When does a witness of fact stray into impermissible expert opinion?", a: "When their statement implies a technical conclusion requiring specialised knowledge (e.g. cause of a car malfunction requiring automotive expertise). The perceived fact exception does not extend to technical conclusions requiring expertise." },
  { id: 197, module: "DR", q: "When must cost budgets be filed and exchanged in multi-track cases?", a: "No later than 21 days before the first CMC in most multi-track cases." },
  { id: 198, module: "Tort", q: "What is the Bolam test, and does informed consent protect a doctor from liability?", a: "A professional is not negligent if their actions are supported by a responsible body of opinion within the profession, even if there is a contrary view. Informed consent about side effects does not absolve a doctor of liability for the choice of treatment." },
  { id: 199, module: "Public", q: "What is the time limit for bringing a claim under the HRA?", a: "Within one year of the date of the act complained of." },
  { id: 200, module: "PP", q: "If there is no restriction in the Proprietorship Register requiring mortgage lender's consent, what should the buyer's solicitor do about an existing mortgage?", a: "Ensure an undertaking is received from the seller's solicitor to arrange discharge of the mortgage upon completion. Requesting the seller to obtain the lender's consent to sell is unnecessary where no such restriction exists." },
  { id: 201, module: "PP", q: "If a seller gave an indemnity covenant for a positive covenant when they purchased the property, what obligation does the buyer take on?", a: "The buyer will be bound by the positive covenant and must also give an indemnity covenant to the seller in the transfer." },
  { id: 202, module: "Trusts", q: "What is required to effect a valid retirement of a trustee without replacement under s39(1) TA 1925?", a: "At least 2 trustees or a trust corporation must remain, and there must be a deed declaring the retirement with the consent of the co-trustees. The trust property must be vested in the names of the remaining trustees." },
  { id: 203, module: "Trusts", q: "Can a trustee's discretion cure conceptual uncertainty of the class of objects?", a: "No — the class itself must be conceptually certain. A trustee's discretion does not fix uncertainty in the definition of the objects." },
  { id: 204, module: "PP", q: "What are the notice requirements for a s25 notice to terminate a business tenancy?", a: "Minimum (latest) notice: 6 months before the proposed termination date. Maximum (earliest) notice: 12 months before." },
  { id: 205, module: "PP", q: "If a risk is an insured risk under the landlord's buildings policy, does this cover the tenant's personal contents?", a: "No — the landlord's buildings policy covering the structure does not imply coverage for the tenant's personal contents." },
  { id: 206, module: "Crim", q: "What is the test for whether an act is 'dangerous' for unlawful act manslaughter?", a: "A sober and reasonable person would recognise that the act was likely to cause some harm. There is no requirement that it be likely to cause death or serious harm." },
  { id: 207, module: "Ethics", q: "Does an undertaking need to be in writing to be binding?", a: "No — an undertaking can be given orally, provided it can be reasonably relied upon by the recipient." },
  { id: 208, module: "PP", q: "When receiving a deposit as seller's solicitor, how should it be held?", a: "As agent — held in the client account. If held as stakeholder, the funds would be held in trust for both buyer and seller, which has different implications." },
  { id: 209, module: "PP", q: "Under Law Society Formula B, what undertaking must the buyer's solicitor give after agreeing the date and time of exchange?", a: "An undertaking to post the signed contract to the seller's solicitor by first class post or DX and to send the deposit in the form specified by the contract. Both solicitors must also exchange each other's names to write on the contract." },
  { id: 210, module: "Crim", q: "What is the distinction between s18, s20 and s47 OAPA 1861?", a: "S18: specific intent to cause grievous bodily harm. S20: intentionally or recklessly causes a wound or GBH. S47: intentionally or recklessly causes actual bodily harm." },
  { id: 211, module: "Trusts", q: "How does the statutory wait and see rule apply to perpetuity?", a: "Under the statutory perpetuity rule, a trust is treated as valid until it becomes clear that the condition cannot be satisfied within the perpetuity period. This is distinct from certainty of objects questions." },
  { id: 212, module: "Trusts", q: "When does a presumed resulting trust arise, and how are equitable interests determined?", a: "In the absence of an express trust or evidence to the contrary, a presumed resulting trust arises and equitable interests are determined by each party's respective contributions to the purchase price — not by how legal title is held." },
  { id: 213, module: "PP", q: "How should a post-1926 equitable easement over unregistered land be protected?", a: "By registration as a Land Charge, entered against the name of the grantor (the owner of the servient land — not the address of the land). This ensures it is enforceable against any purchaser." },
  { id: 214, module: "Land", q: "What is the test for distinguishing a chattel from a fixture?", a: "The annexation test: whether the item is intended to permanently enhance the land and has been treated as such over time. The owner's personal view does not determine legal status. A chattel can be fixed for better enjoyment; a fixture can be free-standing if intended to enhance the land." },
  { id: 215, module: "WAE", q: "At what date is an asset valued for appropriation by executors, and what is the limit?", a: "At the date of appropriation. If an item's value at that date exceeds the beneficiary's entitlement, the executor cannot appropriate that item to that beneficiary." },
  { id: 216, module: "PP", q: "When does a mortgagee's right to take possession arise, and can they use self-help?", a: "The right arises as soon as the mortgage is granted. The lender may take possession without a court order but must not use or threaten violence to gain entry." },
  { id: 217, module: "PP", q: "When is a collateral advantage in a commercial mortgage transaction enforceable?", a: "Where it offers the borrower something in return (e.g. significant savings) and does not outlast the mortgage term. Such a tie is generally upheld in commercial transactions." },
  { id: 218, module: "PP", q: "What is the effect of assignment on the original tenant's liability, and when does an AGA change this?", a: "The original tenant is released from liability after assigning the lease unless they give an Authorised Guarantee Agreement (AGA). With no AGA: released. With an AGA: remains liable." },
  { id: 219, module: "Crim", q: "What constitutes an intention to permanently deprive under the Theft Act?", a: "Treating the property as one's own to dispose of, regardless of the owner's rights. Whether the owner gave permission or not is not relevant to this analysis." },
  { id: 220, module: "Land", q: "Do unprotected proprietary rights in land bind third parties even if they had knowledge of them?", a: "Not typically — proprietary rights such as easements must be created with the necessary formalities (deed and registration). Unprotected rights will not generally bind third parties even if those parties knew about them." },
  { id: 221, module: "Ethics", q: "What do SRA Account Rules 7.1 and 7.2 require regarding interest on client money?", a: "Rule 7.1: account for fair interest on any client money held. Rule 7.2: the firm may by written agreement with the client reach a different arrangement on payment of interest, but informed consent is required." },
  { id: 222, module: "Trusts", q: "What does certainty of subject matter require, and is 'the most valuable' item sufficiently certain?", a: "The trust property must be clearly identified. 'The most valuable' is a subjective criterion that does not provide sufficient clarity — it fails the certainty of subject matter requirement." },
  { id: 223, module: "WAE", q: "What power do personal representatives have in relation to a sole trader business on death?", a: "There is a limited common law power enabling PRs to sell the business as a going concern within one year of death." },
  { id: 224, module: "PP", q: "Does the rule in Wheeldon v Burrows apply to reservations?", a: "No — the rule only applies to grants. It cannot be used to claim an easement by reservation. The rule provides that on a sale of part, the buyer automatically acquires quasi-easements that are continuous, apparent and reasonably necessary for enjoyment of the land sold." },
  { id: 225, module: "PP", q: "What is required to create an express legal easement that is enforceable against third parties?", a: "It must be created by deed in compliance with LPMPA 1989 and registered at the Land Registry. It can be included in the transfer deed — a separate deed is not necessary." },
  { id: 226, module: "Ethics", q: "How is a mortgage advance received from a lender on behalf of a client treated under the SRA Accounts Rules?", a: "It is treated as client money and must be held in the client account." },
  { id: 227, module: "Ethics", q: "In a company acquisition, what CDD obligations arise regarding beneficial owners?", a: "You must check whether any individual owns more than 25% of the shares. If so, standard CDD must be carried out on such beneficial owners as well as on the company itself." },
  { id: 228, module: "Ethics", q: "Under a Damages Based Agreement, is the success fee offset against recovered costs from the other side?", a: "No — the success fee under a DBA does not get offset against the hourly rate recovered from the other side." },
  { id: 229, module: "Ethics", q: "Are referral fees in personal injury cases prohibited?", a: "Solicitors are prohibited from paying or receiving referral fees in connection with personal injury claims. However, the referral itself is not prohibited — only the payment or receipt of a fee for it." },
  { id: 230, module: "Ethics", q: "What tests must be satisfied for Civil Community Legal Service funding?", a: "Both a means test and a merits test must be satisfied. The merits test includes showing that the case has a reasonable prospect of success." },
  { id: 231, module: "Ethics", q: "Who is responsible for competence and supervision failures — the fee-earner or the supervisor?", a: "Both — the fee-earner (no matter how junior) and the supervisor are individually responsible for competence and supervision failures." },
  { id: 232, module: "Land", q: "What is the meaning of a sham clause?", a: "Genuine attendance or services by the landlord (e.g. daily cleaning requiring unrestricted access) can mean the occupier lacks exclusive possession and therefore only has a licence. A sham clause is where e.g. daily cleaning requiring unrestricted access does not happen in real life" },
  { id: 233, module: "Land", q: "How does the burden of covenants pass on?", a: "At Common Law: the burden will not pass, 
Equitable rules (Tulk v Moxhay): 1/ covenant must be restrictive, 2/ covenant must accommodate the DT, 3/ intention for the burden of the covenant to run, 4/ notice of the covenant" },
  { id: 234, module: "Land", q: "How does the benefit of covenants pass on?", a: "Common Law (positive and restrictive): express assignment (writing + express notice), implied assignment (1/ touch and concern the land, 2/ intention that benefit should run with land, 3/ original covenantee has legal estate of DT, 4/ successor covenantee hold legal estate of DT)

Equitable rule (if negative): burden has passed in equity, and benefit as ell (1/ covenant touch and concern DT, 2/ benefit passes through annexation/ building scheme/ assignment)" },
  { id: 235, module: "Tort", q: "What is the doctor's duty to disclose risks under the Montgomery ruling?", a: "Medical professionals have a duty to take reasonable care to ensure that the patient is aware of any material risks involved in any recommended treatment, allowing the patient to make an informed decision. 
A risk is considered material if a reasonable person in the patient's position would likely attach significance to it or if the healthcare provider is or should be aware that the particular patient would find it significant.
Overrides Bolam test." },
  { id: 236, module: "Ethics", q: "Can solicitors provide advice on mortgages?", a: "S19 of FSMA 2000: providing advice on mortgage products is considered a regulated activity, and only individuals or firms authorised by the FCA can provide such advice." },
  { id: 237, module: "Ethics", q: "Can a solicitor amend a fixed fee agreement?", a: "The solicitor must adhere to the agreed fixed fee and cannot charge extra for the additional work unless a new agreement is reached with the client. 
Any additional charges outside of the fixed fee must be agreed upon separately and must be mutually agreed upon by both parties - cannot change unilaterally without the client's consent." },
  { id: 238, module: "BLP", q: "Preference transaction: Is there a presumption of desire to prefer with a close friend?", a: "No, because a close friend is not is not an associate so not a connected person. We apply the unconnected criteria: within 6 months, insolvency required and no presumption." },
  { id: 239, module: "Tort", q: "Are pedestrians absolved from all responsibility?", a: "No: despite the adverse weather conditions, a pedestrian is expected to take reasonable care for their own safety, which includes checking for oncoming traffic before crossing the road." },
  { id: 240, module: "DR", q: "On who a CF should be served if a claim is brought against a partnership?", a: "Claims against a partnership should be brought against the name under which the partnership carried on business at the time the cause of action accrued. Possible to name individual partners which can prevent enforcement issues." },
  { id: 241, module: "Tort", q: "How do you establish factual causation when a disease/injury is the result of cumulative exposure (causes) and it cannot be proven that the exposure due to the defendant's breach alone caused the disease ?", a: "The material contribution test: showing that the breach contributed in a more than negligible way to the development of the disease." },
  { id: 242, module: "DR", q: "What is the effect of a claimant failing to obtain a judgment more advantageous than a defendant's Part 36 offer?", a: "Unless the court considers it unjust, the claimant will be ordered to pay the costs incurred by the defendant from the date the relevant period expired plus interest on those costs. 
A judgment in the claimant's favour does not automatically entitle them to their costs if the judgment is not more advantageous than the Part 36 offer." },
  { id: 243, module: "DR", q: "What is the standard of proof required for an interim injunction?", a: "American Cyanamid guidelines: an interim injunction can be granted if there is a serious question to be tried and if damages would not be an adequate remedy" },
  { id: 244, module: "Public", q: "What is the expedited remedial action under s10 HRA 1998 following a declaration of incompatibility?", a: "The minister can ask for a draft amending order to be prepared which corrects the incompatibility of the legislation, if there are compelling reasons for doing so. This order should be laid before Parliament for 60 days before it is approved by both Houses." },
  { id: 245, module: "Ethics", q: "What are the offences under POCA 2002", a: "3 main principal= 
S327: Concealing, disguising, converting, transferring, or removing criminal property 
s328: Arranging by entering into or becoming concerned in an arrangement that you know or suspect will facilitate 
s329: Acquisition, use, or possession 

Others=
s330: non-direct involvement offence of failure to disclose
s.333A: tipping off about a disclosure" },
  { id: 246, module: "Contract", q: "What is the obligation regarding payment of contract which has not been perfectly performed?", a: "Principle of 'substantial performance': where a contractor who has completed most of the work to a satisfactory level is entitled to payment, less any necessary deductions to fix defects. => allowed to make a deduction for the cost of remedying the defect, even if the contract has been substantially performed
Quantum meruit: when partial performance has been voluntarily accepted but the amount of work done by the contractor amounts to substantial not partial performance." },
  { id: 247, module: "Contract", q: "After a breach of contract, what could manufacturer do to fulfil their duty to mitigate damages?", a: "Selling the materials at a reduced price to another party is a reasonable step to mitigate losses because it involves minimising the financial impact of the breach by recovering some value from the unusable  materials. 
=> duty to lessen the financial impact of the breach" },
  { id: 248, module: "Ethics", q: "What is the immediate action required by the solicitor's firm upon receiving notice of the claim?", a: "Immediately notify the firm's indemnity insurance providers where a claim against a solicitor, or an intention to make such a claim, may be covered by the policy." },
  { id: 249, module: "Contract", q: "Is a statement made at the time of negotiations considered a term of the contract?", a: "The timing of the statement and its exclusion from the final written contract indicate that it was likely not intended by the parties to be a binding term. Instead, it was a representation made during negotiations that induced the buyer to enter into the contract.
Not all statements made during negotiations are automatically considered terms of the contract." },
  { id: 250, module: "Public", q: "Who has standing to bring judicial review?", a: "R v Secretary of State for Foreign and Commonwealth Affairs,
ex parte Rees-Mogg: where an individual with a sincere concern for public
matters will be granted standing.
Courts weigh the importance of the legal grounds, whether the challenge is in the public interest, and whether there is an alternative remedy available." },
  { id: 251, module: "Tort", q: "What can estate/dependants claim following death due to negligence?", a: "Law Reform (Miscellaneous Provisions) Act 1934: the estate can claim for losses suffered by the deceased up to the date of death. 
The Fatal Accidents Act 1976: dependents can claim for losses suffered as a result of the death, including loss of financial support and funeral expenses." },
  { id: 252, module: "BLP", q: "What determines a fixed charge?", a: "Creditor's control over the disposal and additional encumbrance of the charged assets, while still allowing the borrower to use the assets in their regular business activities" },
  { id: 253, module: "DR", q: "What is the cap for DBA?", a: "Personal Injury Claims: Up to 25% (often capped to general damages, excluding some future losses).
Employment Tribunals: Up to 35%.
General Civil / Commercial Claims: Up to 50%." },
  { id: 254, module: "Public", q: "How and when is a declaration of incompatibility issued?", a: "1. s3 HRA = duty on the court to read/interpret piece of legislation in a compatible way with a Convention right. 
2. s4 HRA = courts to issue a declaration of incompatibility if it finds that a piece of legislation, including by-laws, is incompatible with a Convention right (although it does not have to do so). 
This declaration does not strike down the legislation, but it signals to the minister and to Parliament that the law needs to be amended to comply with the Convention rights. The law remains in effect until the government takes action to arrange for it to be amended." },
  { id: 255, module: "Public", q: "When does the defence under s6 HRA will not have effect?", a: "If the relevant law can be interpreted in a way that respects the right to freedom of expression under s3, the statutory defence under section 6(2) will not have effect, and the public authority cannot avoid liability under section 6(1)." },
  { id: 256, module: "Land", q: "What is the doctrine of notice ?", a: "It protects purchasers who buy land without notice of pre-existing equitable interests. 
If the buyer did not have actual knowledge of the equitable right of way + the buyer made the usual pre-completion searches and enquires, physically inspected the land and there is no indication the buyer has an agent acting for them = will not be regarded as having constructive or imputed notice 
Therefore, the buyer qualifies as 'equity's darling' and takes the land free from the neighbour's equitable interest." },
  { id: 257, module: "Land", q: "What happens to equitable rights created before 1926?", a: "They are only enforceable against a purchaser if they have notice of it. It is not automatically binding on all subsequent owners. 
Had the equitable right of way easement been created post 1926, it should have been protected by a Land Charge and this would determine enforceability." },
  { id: 258, module: "CLP", q: "What is the best course of action after someone properly authorised on behalf of a detainee requests the solicitor to attend the police station?", a: "Contact the police station to confirm if the detainee wishes to instruct the solicitor, and if so, attend to advise the client." },
  { id: 259, module: "Crim", q: "How does the principle in R v Blaue/\"defendant must take their victim as they find them\" applies?", a: "This includes any decisions the victim makes regarding medical treatment. I.e.: refusal of surgery does not constitute a novus actus interveniens that breaks the chain of causation." },
  { id: 260, module: "CLP", q: "How many business days after service of the notice  to introduce hearsay evidence does the defence have to indicate if the hearsay evidence application is to be opposed?", a: "10 business days - there is an obligation to indicate opposition within the specified time frame; otherwise, the court may assume that the defence consents to the admission of hearsay evidence" },
  { id: 261, module: "CLP", q: "Who can preside a Youth Court?", a: "A District Judge sitting alone, and both Magistrates and District Judges are required to undergo specialist training to sit in the youth court" },
  { id: 262, module: "WAE", q: "What is needed when the executors are asked to appropriate a specific asset in satisfaction of a beneficiary's share provided it does not exceed their entitlement?", a: "Consent from all beneficiaries is not required for appropriation; only the consent of the beneficiary receiving the asset is needed" },
  { id: 263, module: "PP", q: "What are the requirements for a good root of title?", a: "1/ It must be at least 15 years old. 2/ It must deal with or show the ownership of the entire legal and equitable interest in the property. 3/ It must contain a clear, recognisable description of the property. 4/ It must contain nothing that casts doubt on the validity of the title
A deed executed under a PoA raises questions about whether the power was still in force, which casts doubt on the seller's title" },
  { id: 264, module: "Crim", q: "Is information considered property for the purposes of criminal damage?", a: "No - s10(1)  of Criminal Damage Act 1971 does not include information. R v Whitely confirms that information is not considered property for the purposes of criminal damage." },
  { id: 265, module: "Land", q: "Is a garden shed that rests on its own weight and is not attached to the land more likely to be considered a fixture or a chattel?", a: "A chattel because the garden shed is not physically attached to the land and relies on its own weight to remain in place." },
  { id: 266, module: "Ethics", q: "If the client sends money as a reimbursement of a disbursement incurred by the firm, which account should it be deposited into?", a: "Into the firm's business bank account - a bill is not necessary for the reimbursement of costs already paid by the firm" },
  { id: 267, module: "Ethics", q: "When should an accountant's report be delivered to the SRA?", a: "An accountant's report should only be delivered to the SRA if it is qualified, meaning it shows a failure to comply with the rules so that the client's money is at risk." },
  { id: 268, module: "CLP", q: "What happens to D's credit for guilty plea if there was a need for a Newton hearing and it was decided on the prosecution's basis?", a: "The Reduction in Sentence for a Guilty Plea guideline indicates that the credit should normally be halved under such circumstances, as the court time and resources were used, and witnesses may have been called that would not have been necessary had the defendant not disputed the prosecution's version of the facts." },
  { id: 269, module: "CLP", q: "How is the competence of a child witness determined?", a: "By their ability to understand questions and give comprehensible answers, not by their age." },
  { id: 270, module: "WAE", q: "Does a life interest trust where the spouse is the life tenant qualify for spouse exemption?", a: "Yes - the value of the assets passing into the trust is not subject to IHT" },
