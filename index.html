  { id: 276, module: "Crim", q: "What is the legal obligation when someone becomes aware they have acquired property by mistake?", a: "Legal obligation to restore the property. The failure to return the property upon realising the mistake means they are obligated to restore it.
Keeping the money without intent to permanently deprive does not automatically constitute theft, but it does create a legal obligation to restore it." },
  { id: 277, module: "Crim", q: "What are the requirements for Criminal Damage?", a: "AR: destroys or damages property belonging to themselves or another without lawful excuse
MR: intends or reckless as to destroy or damage property. Recklessness includes taking an unjustifiable risk that property will be damaged" },
  { id: 278, module: "Land", q: "How can an estate contract become enforceable after the sale of a property?", a: "An estate contract has been validly created as an equitable interest: in writing, signed by both the parties and contains all the agreed terms
Should be protected by entry of notice in the charges register to bind a purchaser for value of the estate. 
However, if not registered, basic rule of priority applies: if not a purchaser for value, but a donee (i.e. because inherited the land), the donee is bound by all properly created interests in the land regardless of registration of interest." },
  { id: 279, module: "Public", q: "Does a pressure group have automatic standing to bring a judicial review claim?", a: "No - but the court has a discretionary power to allow a pressure group to make a challenge. It is up to the court" },
  { id: 280, module: "Ethics", q: "Which one prevails in a situation that opposes duty of confidentiality and duty to disclose with option to get written consent from client to agree not to see the disclosable info?", a: "The exceptions to the duty of disclosure: client gives informes consent, given or evidenced in writing
Therefore solicitor can act - duty of confidentiality prevails but can act" },
  { id: 281, module: "BLP", q: "What resolutions are needed for the buy back of shares?", a: "OR to approve buy back 
SR to approve payment out of capital" },
  { id: 282, module: "Public", q: "What are the police powers when it comes to dispersing demonstrators/protestors?", a: "The police will only be able to disperse the demonstrators if they reasonably fear a breach of the peace. 
The police cannot disperse protesters from private land unless a crime is being committed, or there is a breach of peace, or there is a serious disruption to the life of the community, or significant damage to the land" },
  { id: 283, module: "Contract", q: "How is an exemption clause treated?", a: "It is subject to the reasonableness test, it is not automatically void
The timing and bargaining positions will be taken into account when deciding whether the clause is reasonable - if unreasonable, won't apply" },
  { id: 284, module: "Crim", q: "How does the diminished responsibility defence operate?", a: "It is a partial defence to murder but D cannot always rely on it - criteria need to be satisfied
i.e. if D did not understand the nature of their conduct in killing" },
  { id: 285, module: "CLP", q: "Situation to admit D's previous convictions as evidence:
1. Correct false impression 
2. D made attack on other's character
3. Important matter in issue between D and P 
4. Important explanatory evidence", a: "1. D makes express or implied assertion during proceedings 
2. Attack must occur during proceedings (incl. self-defence)
3. If D pleaded not guilty to earlier offence and found guilty, now pleading guilty again 
4. Without it the magistrates would find it impossible/difficult to understand" },
  { id: 286, module: "DR", q: "What is the best practice after confirming attendance of essential witnesses?", a: "Having notified witness of trial, and confirmed attendance, solicitor should serve witness with a witness summons" },
  { id: 287, module: "DR", q: "What value is regarded when considering case allocation?", a: "The damages - interests and contributory negligence are disregarded 
Small Claims Track: Up to £10,000
Fast Track: £10,000 to £25,000
Intermediate Track: £25,000 to £100,000
Multi-Track: Over £100,000" },
  { id: 288, module: "DR", q: "What are the disclosure lists?", a: "List 1: Documents You Disclose and Produce
- Part 1: Docs to handover 
- Part 2: Docs opposing inspection (i.e. legal privilege)
List 2: Documents You No Longer Have" },
  { id: 289, module: "Public", q: "Difference between codifying and consolidating statute?", a: "Codifying: brings together law previously contained in different pieces of legislation and caselaw, as well as modifying aspects 
Consolidating: merely re-enacts law previously contained in several different statutes, rebuttable presumption that such statute does not materially alter the previous law" },
  { id: 290, module: "CLP", q: "What are the appeal routes from the magistrates court? from CC?", a: "Appeal de novo - CC / CoA
Case states / Judicial review - High Court / Admin Court KBD" },
  { id: 291, module: "Land", q: "Are leases for less than 7 years overriding interests?", a: "Yes - i.e. created by deed if 5y but not registered, they are automatically overriding over registered interests" },
  { id: 292, module: "Land", q: "When does the rule \"legal interests bind the world\" apply?", a: "To unregistered land" },
  { id: 293, module: "Public", q: "Under EA 2010, can an employer choose a candidate from an under-represented/disadvantaged group over another?", a: "Yes - provided that both candidates are equally qualified, and the employer reasonably thinks that people with that particular characteristic are under-represented in the workplace" },
  { id: 294, module: "Ethics", q: "What should a solicitor do where a transaction is classed as regulated activity and will be permitted despite no FCA authorisation?", a: "Can take advantage of the exemption under s327 FSMA 2000: SRA Financial Services (Conduct of Business) Rules must be followed" },
  { id: 295, module: "Land", q: "What is the difference between a lease and agreement for lease?", a: "A lease: formal, binding contract that immediately grants a tenant exclusive possession and ownership of a property for a specified period. 
An agreement for lease: merely a legally binding \"pre-contract\" or promise to enter into a formal lease at a later date, subject to specific conditions" },
  { id: 296, module: "PP", q: "How to bring a 1954 protected lease to an end?", a: "Tenant: s27 notice or written notice if past expiry date 
Landlord: s25 hostile notice" },
  { id: 297, module: "PP", q: "What searches are carried out at pre-completion?", a: "If registered land: Land Registry search against title of property (OS1) in buyer's name or lender's if there is a mortgage + solvency searches on the buyer (individual or company)
If unregistered: land charges search against seller's name" },
  { id: 298, module: "Tort", q: "Where C suffers injuries which would have been less severe if C had been wearing a seatbelt, what is the reduction in damages?", a: "15% deduction" },
  { id: 299, module: "WAE", q: "When is a gift adeemed?", a: "The gift automatically fails because the specific asset no longer exists or the testator no longer owns it at the time of their death." },
  { id: 300, module: "Ethics", q: "How to record the receipt of a mortgage advance?", a: "Whilst a mortgage advance can be recorded on the client account of the buyer, the detail column would need to include the name of the lender and the fact that it is a mortgage advance" },
  { id: 301, module: "Public", q: "What is the Sewer Convention?", a: "It concerns circumstances in which the UK Parliament legislates on devolved matters, not on the lawfulness of devolved legislation itself => the UK Parliament will \"not normally\" legislate on devolved matters—such as health, education, and local government—without first obtaining the consent of the relevant devolved legislature (the Scottish Parliament, the Welsh Senedd, or the Northern Ireland Assembly)" },
  { id: 302, module: "Ethics", q: "Is a solicitor obliged to report to MLRO if information obtained in social context?", a: "No obligation to report as long as information not received in the course of business in the regulated sector" },
  { id: 303, module: "Ethics", q: "Is a solicitor liable of tipping off if they ought to have known the disclosure was likely to prejudice an investigation?", a: "No - Tipping off requires actual knowledge or suspicion" },
  { id: 304, module: "Contract", q: "Is rejection of goods always allowed if they do not satisfy the description/quality/etc (implied term)?", a: "Rejection is not permitted for minor or trivial breaches in non-consumer sales" },
  { id: 305, module: "DR", q: "What is the deadline for a party to respond to a request for further information?", a: "There is no set deadline - must allow reasonable time for the other side to respond, context dependent" },
  { id: 306, module: "DR", q: "What is a Part 18 Request?", a: "A party or the court makes a written request asking an opposing party to clarify ambiguities in their statements of case or to provide further information about specific allegations 
-> matter must be relevant and clarification reasonably necessary and proportionate to understand and prepare a case" },
  { id: 307, module: "Public", q: "For which characteristic is justification available as a defence against direct discrimination?", a: "Age - would need to show that the treatment was a proportionate means of achieving a legitimate aim" },
  { id: 308, module: "Contract", q: "Can a reliable third party communicate revocation of an offer?", a: "Yes - so long as the acceptor reasonably believes the information to be true" },
  { id: 309, module: "BLP", q: "What is the statutory order of priority for corporate insolvencies?", a: "1. Liquidator's fees and expenses
2. Fixed charges (ordered in date of creation) 
3. Liquidator's remuneration 
4. Preferential creditors 
5. Prescribed part fund 
6. Floating charges 
7. Unsecured creditors (incl. payment of prescribed part)
8. Interest to unsecured creditors 
9. Shareholders" },
  { id: 310, module: "Ethics", q: "What are the conditions for a solicitor to be able to practice as a freelance solicitor?", a: "1. Must not employ any staff (legal or admin) - otherwise need to register as a sole practitioner 
2. May only carry out reserved legal activities if meet all criteria incl. required experience, insurance and providing services personally" },
  { id: 311, module: "DR", q: "How to challenge a SJE report?", a: "Apply to cross-examine the expert at trial, send second expert report for SJE's review, apply to rely on other report 
Possible to submit written questions to SJE - within 28 days of service of the report" },
  { id: 312, module: "BLP", q: "What are the requirements for a transaction at undervalue is challenged in a situation of bankruptcy?", a: "TUV entered within 5y of bankruptcy
If occurred more than 2y before petition, must prove insolvency (there is a presumption if transaction is with an associate)" },
  { id: 313, module: "Tort", q: "Will an employer be vicariously liable for an employer's act that happened outside of the employment hours?", a: "Yes - only if the off-duty act was closely linked in time and character to an on-duty incident, and part of same confrontation" },
  { id: 314, module: "Public", q: "Which CJEU decisions are binding?", a: "CJEU decisions handed down between exit day and Implementation Period completion day - continue to be binding on UK courts 
CJEU decisions post IP completion day - no longer binding unless Parliament provides otherwise, may be considered" },
  { id: 315, module: "BLP", q: "Calculate corporation tax", a: "1. Trading profit = trading income - allowable expenses 
2. Capital gain (deduct allowable costs)
3. Trading profit + Capital gain
4. Apply rate - 19% up to 50k, 25% above 250k, in between previous year's rate applies" },
  { id: 316, module: "DR", q: "Can a Part 36 Offer be accepted once trial has started?", a: "Yes - only with the court's permission, at its discretion" },
  { id: 317, module: "DR", q: "Can C apply for a summary judgment before D filed AoS or Defence?", a: "C must obtain court's permission 
Court will grant if D has no real prospect of success AND no other compelling reason why the case should proceed to trial" },
  { id: 318, module: "CLP", q: "When can bail be granted when D is charged with a serious sexual offence?", a: "Bail must not be granted unless the court is satisfied that there are exceptional circumstances which justify it" },
  { id: 319, module: "WAE", q: "Can a claim under the Inheritance Act be brought anywhere?", a: "Only where the deceased died domiciled in England & Wales" },
  { id: 320, module: "WAE", q: "What are the requirements when a joint account to administer the estate is opened?", a: "Money is still client money even though it is not a client account
Must obtain regular bank statements at least every 5 weeks and keep a central record of all bills and written notifications of costs relating to the account" },
  { id: 321, module: "PP", q: "In a failure to complete, is the deposit still due?", a: "Unless the standard 10% is expressly varied in a special condition, full amount remains contractually due on default, regardless of who caused the failure to complete" },
  { id: 322, module: "PP", q: "Can a business tenant apply to court to carry out improvements even where lease absolutely prohibits alterations?", a: "Yes - court will assess improvement of letting value, suitability, and that don't diminish value of other property belonging to L" },
  { id: 323, module: "PP", q: "How can L enforce their right to recover the arrears after assignment to A, AGA in place, and A's fails to pay rent?", a: "L can serve a s17 LTA default notice on the guarantor within 6 months of A's breach" },
  { id: 324, module: "CLP", q: "Can an adverse inference be drawn at trial?", a: "Yes - under s35, if D fails to testify without explanation, jury may draw an inference that D has no answer to the charge or does not believe their own defence" },
  { id: 325, module: "PP", q: "When is a lender able to exercise the power of sale?", a: "They can exercise their power of sale without notice and where 2 months' interest is unpaid" },
  { id: 326, module: "Land", q: "What happens if the buyer fails to register the unregistered land it bought within 2 months of completion?", a: "The legal title to the land reverts back to the seller" },
  { id: 327, module: "Trusts", q: "Can a trust over land be enforced without a second trustee?", a: "Yes - it can be made orally first, which makes it unenforceable, until it it is manifested and proved by some writing signed by the property owner and then becomes enforceable" },
  { id: 328, module: "Trusts", q: "What is the limit to a T's power of maintenance?", a: "The terms of the trust instrument" },
  { id: 329, module: "Trusts", q: "If it is not sure whether a transfer is a gift or a loan, who can redeem the equitable interest if a dispute arises?", a: "When a transfer is made without consideration and there is no evidence of the transferor's intention to make a gift, the equitable interest results back to the transferor. Absence of evidence of intention = presumption of resulting trust + beneficial interest reverts to where it was" },
  { id: 330, module: "CLP", q: "When does the presumption of bail apply or does not?", a: "Applies: after a conviction, such as when the case is adjourned for reports prior to sentencing
Does not apply: when a D is committed for sentence from the Magistrates' Court to the Crown Court, or when D appealing against their conviction or sentence" },
  { id: 331, module: "CLP", q: "When must P serve notice of any intention to introduce D's bad character evidence?", a: "Within 20 days of the not guilty plea being entered." },
  { id: 332, module: "CLP", q: "When must D lodge a notice of appeal? (from Magistrates and from CC)", a: "Within 15 business days and serve it on the CC and P.
Within 28 days of the conviction and serve it on the Registrar of the Criminal Division of the CoA." },
  { id: 333, module: "PP", q: "What is the procedure to contract out of security of tenure?", a: "Serving warning notice at least 14 days before the lease completion and obtaining a statutory declaration if the lease completion is less than 14 days away. The lease must reference both the warning notice and the declaration." },
  { id: 334, module: "WAE", q: "What should executor do after administration of estate is completed?", a: "Must ensure that the estate accounts are signed and approved by the residuary beneficiaries, signifying their agreement with how the estate has been administered and releases the executor from further liability to account. No need to register accounts with the Probate Registry" },
  { id: 335, module: "WAE", q: "How do you calculate tax on LCTs and PETs?", a: "Apply percentage on the amount that goes above the nil band rate" },
  { id: 336, module: "WAE", q: "How can you incorporate an unexecuted document into a will?", a: "If it is clearly identified in the will, was in existence at the time the will was executed, and is referred to as existing at that time" },
  { id: 337, module: "WAE", q: "What is the chain of representation?", a: "When the sole or last surviving executor of an estate dies after taking out the grant but before completing the administration, their own executor can continue the administration without needing a new grant" },
  { id: 338, module: "WAE", q: "What happens if a valid DMC is made but the donor survives?", a: "The gift is void and goes back to the donor" },
  { id: 339, module: "Contract", q: "What are the exceptions to \"silence not constituting misrepresentation\"?", a: "Half-truths, Change in Circumstances, Contracts of Utmost Good Faith (Uberrimae Fidei), Active Concealment, Fiduciary or Confidential Relationships" },
  { id: 340, module: "Ethics", q: "Can notarial activities be carried out by any legal professional?", a: "They can be carried out by specified regulated legal service providers, but if a freelance solicitor tries to they would need to be qualified as a notary" },
  { id: 341, module: "DR", q: "Which is preferred where the parties want a quick resolution and guarantee of conclusion of dispute?", a: "Arbitration over mediation" },
  { id: 342, module: "Ethics", q: "What regulations are costs lawyers subject to?", a: "Costs Lawyer Standards Board, NOT to SRA or Legal Services Board" },
  { id: 343, module: "Tort", q: "What is the difference between Factual v Legal causation?", a: "Factual: But for test (“Did D’s specific action actually cause the harm?”) Legal: remoteness and intervening acts (“Should D still be held legally responsible, despite having factually caused the harm?”)" },
  { id: 344, module: "Contract", q: "How can something be incorporated by notice?", a: "Reasonable notice must be provided before or at the time the contract is formed" },
  { id: 345, module: "Ethics", q: "How quickly are solicitors required to notify the SRA promptly if they are subject to any criminal charge, conviction or caution?", a: "Promptly" },
  { id: 346, module: "DR", q: "How and when can parties appeal against arbitrator’s decision?", a: "If they felt that law had been wrongly applied, so need permission of the court to make appeal" },
  { id: 347, module: "Ethics", q: "How to establish whether professional indemnity insurance is adequate and appropriate?", a: "Size of firm, nature of work, value of claims liabilities firm may be exposed. 
I.e. £5 mil cover but if size firm with high value injury claim - unlikely to have satisfied requirement" },
  { id: 348, module: "Public", q: "When can a judge refer to external aids to interpretation?", a: "Only where meaning of statutory provision is ambiguous or lacks clarity." },
  { id: 349, module: "Public", q: "When can judge refer to Hansard? (*official report of all parliamentary debates)", a: "Only in cases where Hansard material contains clear statement that were made by a minister regarding meaning or scope of the relevant statute" },
  { id: 350, module: "BLP", q: "Can a partner's property be transferred to the partnership business assets", a: "Yes, by inclusion in the partnership agreement" },
  { id: 351, module: "DR", q: "where PI occurred in England, but one party from Belgium, what would be the governing law?", a: "Governing law is England but can issue in both England or Belgium" },
  { id: 352, module: "Contract", q: "How can a contract be void for mistake as to quality?", a: "Need to establish that the lack of quality rendered the contract essentially different from what party believed it to be. In absence of any representation or warranty, the party will have no remedy in law of mistake" },
  { id: 353, module: "BLP", q: "When would a company be preferred over an LLP?", a: "For limited liability for debts, attract finance, recognised worldwide" },
  { id: 354, module: "BLP", q: "What is the best way for a sole trader to raise funds?", a: "Borrow money from third party" },
  { id: 355, module: "DR", q: "What is limitation for latent damage claim in tort (hidden structural defects)?", a: "Primary limitation is 6y from date of cause of action, secondary is 3y from date of knowledge, long-stop date is 15y from date of negligent act" },
  { id: 356, module: "DR", q: "If a PI claim is over 50k, where should it be tried?", a: "High Court" },
  { id: 357, module: "Public", q: "What is the difference between  assimilated and retained EU law?", a: "From January 2024, all former EU law that was directly applicable in the UK and all domestic legislation which implemented or related to former EU obligations was classified as assimilated law - assimilated replaced concept of retained EU law" },
  { id: 358, module: "Public", q: "What should a solicitor do if they are aware harassment in a law firm?", a: "Must inform SRA AND may inform COLP" },
  { id: 359, module: "Contract", q: "What type of loss is compensated for breach of contract?", a: "In case of breach of contract, normal loss will be compensated, abnormal won’t be. This includes loss unlikely to be within reasonable contemplation, and too remote - unrecoverable" },
  { id: 360, module: "Contract", q: "What is the difference between Economic loss and Consequential loss?", a: "Economic loss = loss of profit, Consequential loss = caused indirectly by a specific prior incident, such as property damage or PI" },
  { id: 361, module: "Contract", q: "Are consumers entitled to reject goods if breach of quality and claim full refund?", a: "Yes, consumer contracts will imply that goods are of satisfactory quality as a condition" },
  { id: 362, module: "Ethics", q: "Can legal executives carry on reserved legal activities?", a: "Yes, if under the instruction and supervision of a solicitor who is authorised to carry on such activities" },
  { id: 363, module: "Contract", q: "What is the contra preferentem rule?", a: "Courts are generally hostile to a clause seeking to exclude liability, they will favour interpretation that goes against the party wishing to rely on that clause" },
  { id: 364, module: "DR", q: "How will C apply for a judgment in default?", a: "After D has not filed defence or acknowledgment, with form N244 + fee sent to court" },
  { id: 365, module: "Ethics", q: "What is the means test for civil legal aid?", a: "Disposable income is £733 or less, gross income is less than £2,657, disposable capital is below £8,000" },
  { id: 366, module: "Tort", q: "What are the requirements for a primary victim?", a: "In danger zone + suffered psychiatric harm as result of fear for their own safety" },
  { id: 367, module: "Tort", q: "What is an actual victim?", a: "Suffered physical harm OR physical + psychiatric harm" },
  { id: 368, module: "Ethics", q: "When is profession indemnity insurance needed?", a: "When business is engaged in reserved legal activities (ie if engaged in will writing is not a reserved legal activity so no need for PII)" },
  { id: 369, module: "Contract", q: "What is a contract of convenience?", a: "Employer contracts with insurer for employee, employee has a presumed right of enforceability but no consideration given nor needed from employee" },
  { id: 370, module: "DR", q: "Can D include counterclaim in defence on facts that are different from those in the original claim?", a: "Yes, no need to issue proceedings separately" },
  { id: 371, module: "Tort", q: "When will an employer no longer be vicariously liable?", a: "If D is no longer acting in the course of the employment (ie by using a tool unrelated to employment)" },
  { id: 372, module: "BLP", q: "What are the requirements for a substantial property transaction?", a: "It exceeds 10% of company’s assets and over 5k, OR exceed 100k AND consideration is cash, company needs to pass OR" },
  { id: 373, module: "BLP", q: "What is ostensible authority?", a: "A person appears to be an agent with the power to act on behalf of a company or individual, even if they lack that actual authority." },
  { id: 374, module: "DR", q: "What is the test for a freezing injunction?", a: "Whether there is a real risk of D dissipating assets" },
  { id: 375, module: "Tort", q: "Will the court award damages for anything arising out of a PI claim?", a: "Court will not award any damages for something that is a choice of C and not a consequence of the accident or D’s negligence" },
  { id: 376, module: "Public", q: "When can the police instruct protestors to move their demonstration?", a: "Where there is a reasonable belief that the demonstration may result in serious disorder (threshold is higher than simply reasonable and necessary)" },
  { id: 377, module: "Tort", q: "Is the defence of consent available in cases where a passenger accepts the risk associated with an intoxicated driver?", a: "No, invalid" },
  { id: 378, module: "DR", q: "How can D defend themselves against a summary judgment?", a: "If convince court at the summary judgment hearing that D has even slightly more than a fanciful chance of successfully defending the claim, court will make a conditional order requiring D to file a proper defence setting out their legal/factual position within 14 days of the date of the hearing" },
  { id: 379, module: "Ethics", q: "What happens if a medical expert exaggerates their findings?", a: "Court must first be informed of it before speaking to the expert to avoid misleading the court" },
  { id: 380, module: "BLP", q: "What are specified investments?", a: "Shares/stock, gilts (gov and public securities), insurance contracts, deposits, collective investment schemes, mortgages and credit agreements, options/futures/derivatives. NOT investment property" },
  { id: 381, module: "Tort", q: "What happens if D negligently injures C while they are committing illegal act (ie robbing bank)?", a: "If there is a close connection between D’s actions and C’s injuries, and it would be adverse to public policy to allow C to be awarded damages for their injuries, the court is unlikely to find D at fault" },
  { id: 382, module: "BLP", q: "What happens after a director is removed by OR?", a: "Companies House and Register of Directors must be updated" },
  { id: 383, module: "Public", q: "Can a Secretary of State be given the power to introduce regulations?", a: "Yes, by Parliament, provided they have been given the power to introduce them under an enabling or parent Act" },
  { id: 384, module: "DR", q: "What is the overriding objective?", a: "Cases should be dealt with in ways that are proportionate to the amount of money involved" },
  { id: 385, module: "Public", q: "What is the supermajority requirement for protected subject matter for a Senedd Bill? (ie changing name of the Senedd)", a: "Supported by a greater proportion (2 thirds) of Senedd members before it can become law" },
  { id: 386, module: "BLP", q: "Who can ask the directors to call an extraordinary general meeting ?", a: "Only a shareholder owning more than 10% of the shares has the right to" },
  { id: 387, module: "Public", q: "Are House of Lords decisions binding?", a: "House of Lords was replaced by Supreme Court, so its decisions continue to bind lower courts" },
  { id: 388, module: "Contract", q: "What is the difference between a condition and warranty in a contract?", a: "Condition (essential to the core purpose of the contract) v Warranty (collateral)" },
  { id: 389, module: "Contract", q: "What is the doctrine of product liability?", a: "Anyone who has been injured or has suffered property damage from defective product can bring claim" },
  { id: 390, module: "Contract", q: "What can be claimed when damage occurs under Consumer Protection Act?", a: "Cannot claim for damage to business property but for personal property exceeding £275 and PI" },
  { id: 391, module: "BLP", q: "What distinguishes a LLP from a private/public company?", a: "In a LLP, shareholders/members can be removed by a majority of others" },
  { id: 392, module: "Public", q: "What is the outcome after a successful judicial review application?", a: "If public authority found to have failed to comply, quashing order is the most adequate remedy as it would quash the original decision and require authority to follow prescribed route" },
  { id: 393, module: "DR", q: "What is the test to be granted permission to appeal?", a: "Appeal would have real prospect of success OR there is some other compelling reason" },
  { id: 394, module: "Contract", q: "How can a person claim contract is voidable (not void) due to mental incapacity?", a: "If party claims contract is voidable (not void) due to mental incapacity, burden is on them" },
  { id: 395, module: "BLP", q: "What is the PA 1890 position in relation to apportionment of profit and losses?", a: "It provides for equal apportionment of profit and losses" },
  { id: 396, module: "DR", q: "Is the witness allowed to claim money?", a: "Allowed to claim compensation for expenses, beyond that it is prohibited" },
  { id: 397, module: "Ethics", q: "What is the best course of action if solicitor receives privileged documents from other side by mistake?", a: "Return them unread and no obligation to inform the client of this" },
  { id: 398, module: "DR", q: "Is the Interests of Justice test passed in the Crown Court?", a: "Automatically" },
  { id: 399, module: "Tort", q: "What is the occupier’s liability concerned with?", a: "Trespassers injured due to the state of the premises, if injuries are not caused by the state of the premises then no liability" },
  { id: 400, module: "Contract", q: "In which cases a customer can bring a claim against a manufacturer?", a: "If manufacturer provided a warranty, for negligence, under strict liability of the Consumer Protection Act if death/PI" },
  { id: 401, module: "Ethics", q: "What is the best course of action where the firm's dress code is discriminatory?", a: "Solicitor can offer to speak to senior partner on behalf of person getting discriminated and seek a reasonable adjustment to the dress code" },
  { id: 402, module: "Public", q: "What are remedial orders?", a: "Type of statutory instrument that is designed to allow the government to quickly amend law in order to remove incompatibility with the HRA 1998 (not a bill)" },
  { id: 403, module: "Contract", q: "What is the effect of frustration of a contract?", a: "Discharge the parties of their future obligations not all of them" },
  { id: 404, module: "Public", q: "What is presumed where a statute deals with criminal offences?", a: "The court would presume that any criminal offence requires proof of mens rea unless the statute expressly states otherwise" },
  { id: 405, module: "Ethics", q: "If a third party or expert does not charge VAT, must the firm still charge VAT to the client?", a: "Yes — even if the third party or expert does not themselves charge VAT, the firm must still charge VAT to the client on any disbursements that are part of the firm's supply of services." },
  { id: 406, module: "Public", q: "When a journalist seeks to publish a story and an injunction is sought by the subject, what must the court assess?", a: "The court must assess whether publication is in the public interest and whether the need to protect confidentiality outweighs the benefit of disclosure." },
  { id: 407, module: "DR", q: "When a defendant cannot admit or deny an allegation, what is the correct approach in a defence?", a: "The defendant should require the claimant to prove the allegation — it is wrong to deny an allegation that is not within the defendant's knowledge." },
  { id: 408, module: "DR", q: "Does a party need court permission to issue proceedings without complying with a pre-action protocol?", a: "No — a party may issue proceedings without complying with the relevant practice direction, but must assess the risks of doing so itself. The court may impose sanctions later if non-compliance was unjustified." },
  { id: 409, module: "WAE", q: "Can the court make an order in respect of jointly owned property that passes outside the succession estate?", a: "Yes — the court has power to make an order in respect of jointly owned property even where it passes outside the succession estate, in appropriate circumstances." },
